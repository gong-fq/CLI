<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLI-Anything · 统计多工具台</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0d1117; --panel:#161b22; --border:#30363d;
      --accent:#f0883e; --accent2:#58a6ff;
      --green:#3fb950; --purple:#bc8cff; --pink:#ff7b72; --yellow:#e3b341;
      --text:#e6edf3; --muted:#8b949e; --radius:10px;
      --font-ui:'Noto Serif SC',serif; --font-mono:'JetBrains Mono',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100vh;display:flex;flex-direction:column;align-items:center;}

    header{width:100%;max-width:860px;padding:30px 24px 0;}
    .header-tag{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;color:var(--accent);text-transform:uppercase;margin-bottom:6px;}
    h1{font-size:clamp(20px,3.5vw,30px);font-weight:700;line-height:1.25;}
    h1 span{color:var(--accent);}
    .subtitle{margin-top:6px;font-size:12px;color:var(--muted);font-family:var(--font-mono);}
    hr.divider{margin:16px 0 0;border:none;border-top:1px solid var(--border);}

    /* ── Tool tabs ── */
    .tool-tabs{width:100%;max-width:860px;padding:14px 24px 0;display:flex;gap:6px;flex-wrap:wrap;}
    .tab{font-family:var(--font-mono);font-size:11px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);color:var(--muted);cursor:pointer;background:transparent;transition:all .18s;display:flex;align-items:center;gap:5px;}
    .tab .dot{width:6px;height:6px;border-radius:50%;}
    .tab[data-tool="regression"]   .dot{background:var(--accent);}
    .tab[data-tool="logistic"]     .dot{background:var(--green);}
    .tab[data-tool="discriminant"] .dot{background:var(--purple);}
    .tab[data-tool="kmeans"]       .dot{background:var(--pink);}
    .tab[data-tool="probability"]  .dot{background:var(--yellow);}
    .tab[data-tool="scatter"]      .dot{background:#67e8f9;}
    .tab[data-tool="timeseries"]   .dot{background:#a78bfa;}
    .tab[data-tool="panel"]        .dot{background:#86efac;}
    .tab[data-tool="regression"].active  {color:var(--accent); border-color:var(--accent);}
    .tab[data-tool="logistic"].active    {color:var(--green);  border-color:var(--green);}
    .tab[data-tool="discriminant"].active{color:var(--purple); border-color:var(--purple);}
    .tab[data-tool="kmeans"].active      {color:var(--pink);   border-color:var(--pink);}
    .tab[data-tool="probability"].active {color:var(--yellow); border-color:var(--yellow);}
    .tab[data-tool="scatter"].active     {color:#67e8f9; border-color:#67e8f9;}
    .tab[data-tool="timeseries"].active  {color:#a78bfa; border-color:#a78bfa;}
    .tab[data-tool="panel"].active       {color:#86efac; border-color:#86efac;}

    main{flex:1;width:100%;max-width:860px;padding:0 24px 24px;display:flex;flex-direction:column;}

    /* ── Viz ── */
    #viz-wrap{display:none;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px 12px;margin-top:14px;animation:fadeUp .3s ease both;}
    #viz-wrap h2{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--accent);text-transform:uppercase;margin-bottom:10px;}
    #viz-canvas{width:100%;height:240px;display:block;}
    #viz-info{margin-top:10px;font-family:var(--font-mono);font-size:12px;color:var(--muted);display:flex;gap:20px;flex-wrap:wrap;}
    #viz-info span{color:var(--text);}

    /* ── Chat ── */
    #chat-box{min-height:260px;max-height:40vh;overflow-y:auto;padding:16px 0;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;margin-top:4px;}
    .bubble{display:flex;flex-direction:column;max-width:90%;padding:11px 15px;border-radius:var(--radius);font-size:14px;line-height:1.7;animation:fadeUp .22s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
    .bubble.user{align-self:flex-end;background:#1c2433;border:1px solid var(--border);}
    .bubble.bot {align-self:flex-start;background:#1a2233;border:1px solid var(--border);}
    .bubble-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;margin-bottom:4px;}
    .bubble.user .bubble-label{color:var(--accent2);}
    .bubble.bot  .bubble-label{color:var(--accent);}
    .bubble.bot pre{background:#0d1117;border:1px solid var(--border);border-radius:6px;padding:10px 13px;margin-top:8px;font-family:var(--font-mono);font-size:12.5px;white-space:pre-wrap;color:#79c0ff;}

    /* ── LLM tag ── */
    .llm-tag{display:inline-block;font-family:var(--font-mono);font-size:10px;padding:2px 7px;border-radius:4px;background:#1f2937;color:#6ee7b7;border:1px solid #065f46;margin-bottom:6px;}

    /* ── Chips ── */
    .hint-chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px;margin-bottom:10px;}
    .chip{font-family:var(--font-mono);font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid var(--border);color:var(--muted);cursor:pointer;background:transparent;transition:all .16s;}
    .chip:hover{border-color:var(--accent);color:var(--accent);}

    /* ── Input ── */
    .input-row{display:flex;gap:9px;align-items:flex-end;border-top:1px solid var(--border);padding-top:14px;}
    #user-input{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font-ui);font-size:14px;padding:10px 13px;resize:none;outline:none;transition:border-color .16s;line-height:1.5;}
    #user-input:focus{border-color:var(--accent2);}
    #send-btn{background:var(--accent);border:none;border-radius:var(--radius);color:#000;font-family:var(--font-mono);font-size:13px;font-weight:600;padding:10px 20px;cursor:pointer;transition:opacity .16s,transform .11s;white-space:nowrap;}
    #send-btn:hover{opacity:.88;}
    #send-btn:active{transform:scale(.96);}
    #send-btn:disabled{opacity:.4;cursor:not-allowed;}

    footer{width:100%;max-width:860px;padding:8px 24px 20px;font-size:11px;color:var(--muted);font-family:var(--font-mono);}

    /* ── 访问码弹窗 ── */
    #auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:9999;}
    #auth-overlay.hidden{display:none;}
    #auth-box{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:32px 28px;width:min(360px,90vw);display:flex;flex-direction:column;gap:14px;}
    #auth-box h2{font-family:var(--font-mono);font-size:13px;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;}
    #auth-box p{font-size:12px;color:var(--muted);font-family:var(--font-mono);line-height:1.6;}
    #auth-input{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-mono);font-size:14px;padding:9px 12px;outline:none;transition:border-color .16s;width:100%;}
    #auth-input:focus{border-color:var(--accent2);}
    #auth-btn{background:var(--accent);border:none;border-radius:8px;color:#000;font-family:var(--font-mono);font-size:13px;font-weight:600;padding:9px;cursor:pointer;transition:opacity .16s;}
    #auth-btn:hover{opacity:.88;}
    #auth-error{font-family:var(--font-mono);font-size:11px;color:#f85149;min-height:14px;}
    #auth-demo-btn{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:var(--font-mono);font-size:11px;padding:7px;cursor:pointer;transition:all .16s;}
    #auth-demo-btn:hover{border-color:var(--muted);color:var(--text);}
    /* 演示模式横幅 */
    #demo-banner{display:none;background:#1a2233;border:1px solid var(--border);border-radius:var(--radius);padding:8px 14px;margin-top:14px;font-family:var(--font-mono);font-size:11px;color:var(--muted);text-align:center;}
  </style>
</head>
<body>

<!-- ── 访问码弹窗 ── -->
<div id="auth-overlay">
  <div id="auth-box">
    <h2>🔐 CLI-Anything · 访问验证</h2>
    <p>本工具台接入了 DeepSeek API。<br>请输入访问码以启用 AI 功能，或以演示模式浏览。</p>
    <input id="auth-input" type="password" placeholder="请输入访问码…" autocomplete="off" />
    <div id="auth-error"></div>
    <button id="auth-btn" onclick="submitAuth()">进入工具台</button>
    <button id="auth-demo-btn" onclick="enterDemo()">以演示模式访问（不启用 AI）</button>
  </div>
</div>
<div id="demo-banner">⚠️ 演示模式：AI 功能未启用，仅展示界面。如需启用，请刷新页面并输入访问码。</div>

<header>
  <p class="header-tag">CLI-Anything · LLM 驱动 · 路线 B</p>
  <h1>统计多工具台 <span>/ Statistical CLI Suite</span></h1>
  <p class="subtitle">天津财经大学统计学院教授　龚凤乾</p>
  <hr class="divider" />
</header>

<div class="tool-tabs">
  <button class="tab active" data-tool="regression"><span class="dot"></span>线性回归</button>
  <button class="tab" data-tool="logistic"><span class="dot"></span>逻辑分类</button>
  <button class="tab" data-tool="discriminant"><span class="dot"></span>线性判别</button>
  <button class="tab" data-tool="kmeans"><span class="dot"></span>K-均值聚类</button>
  <button class="tool tab" data-tool="probability"><span class="dot"></span>概率计算</button>
  <button class="tab" data-tool="scatter"><span class="dot"></span>散点图</button>
  <button class="tab" data-tool="timeseries"><span class="dot"></span>时间序列</button>
  <button class="tab" data-tool="panel"><span class="dot"></span>面板数据</button>
</div>

<main>
  <div id="viz-wrap">
    <h2 id="viz-title">可视化结果</h2>
    <canvas id="viz-canvas"></canvas>
    <div id="viz-info"></div>
  </div>

  <div id="chat-box"></div>
  <div class="hint-chips" id="hint-chips"></div>

  <div class="input-row">
    <textarea id="user-input" rows="2" placeholder="用自然语言描述需求，DeepSeek 自动识别工具…"></textarea>
    <button id="send-btn" onclick="sendMessage()">发送</button>
  </div>
</main>

<footer>CLI-Anything · DeepSeek Function Calling · Netlify Functions</footer>

<script>
// ══════════════════════════════════════════════════════
// 工具注册表（前端镜像，与 llm.js 的 TOOLS 对应）
// 新增工具：① llm.js 加工具描述  ② 这里加 chips + 执行函数
// ══════════════════════════════════════════════════════
const TOOL_META = {
  run_regression:   { tab:'regression',   label:'线性回归',   chips:['拟合一条直线','最小二乘回归','帮我做线性回归'] },
  run_logistic:     { tab:'logistic',     label:'逻辑分类',   chips:['逻辑回归分类','二分类预测','帮我分类'] },
  run_discriminant: { tab:'discriminant', label:'线性判别',   chips:['LDA判别分析','Fisher判别','线性判别'] },
  run_kmeans:       { tab:'kmeans',       label:'K-均值聚类', chips:['K均值聚类 K=3','K=2聚类','帮我聚类'] },
  run_normal:       { tab:'probability',  label:'正态分布',   chips:['正态分布 μ=0 σ=1','正态分布 μ=5 σ=2'] },
  run_poisson:      { tab:'probability',  label:'泊松分布',   chips:['泊松分布 λ=3','泊松分布 λ=5'] },
  run_binomial:     { tab:'probability',  label:'二项分布',   chips:['二项分布 n=10 p=0.5','二项分布 n=20 p=0.3'] },
  run_scatter:      { tab:'scatter',      label:'散点图',     chips:['帮我画散点图','绘制散点图并拟合直线','散点图不要拟合线'] },
  run_arima:        { tab:'timeseries',   label:'时间序列',   chips:['ARIMA时间序列分析','VAR向量自回归','时序趋势预测'] },
  run_panel:        { tab:'panel',        label:'面板数据',   chips:['面板数据固定效应','随机效应估计','Hausman检验'] },
  fetch_bea_data:   { tab:'timeseries',   label:'BEA数据',    chips:['查询美国GDP季度数据','获取PCE月度数据','BEA年度国民账户'] },
};

const TAB_CHIPS = {
  regression:   ['拟合一条直线','最小二乘回归','帮我做线性回归'],
  logistic:     ['逻辑回归分类','二分类预测','帮我分类'],
  discriminant: ['LDA判别分析','Fisher判别','线性判别'],
  kmeans:       ['K均值聚类 K=3','K=2聚类','K=4聚类'],
  probability:  ['正态分布 μ=0 σ=1','泊松分布 λ=3','二项分布 n=10 p=0.5'],
  scatter:      ['帮我画散点图','绘制散点图并拟合直线','散点图不要拟合线'],
  timeseries:   ['ARIMA时间序列分析','VAR向量自回归','时序趋势预测','查询美国GDP季度数据'],
  panel:        ['面板数据固定效应','随机效应估计','固定效应vs随机效应Hausman检验'],
};

// ── 访问控制 ──────────────────────────────────────────
let isDemoMode = false;

function submitAuth() {
  const val = document.getElementById('auth-input').value.trim();
  if (!val) { document.getElementById('auth-error').textContent = '请输入访问码'; return; }
  sessionStorage.setItem('cli_token', val);
  document.getElementById('auth-overlay').classList.add('hidden');
}

function enterDemo() {
  isDemoMode = true;
  document.getElementById('auth-overlay').classList.add('hidden');
  document.getElementById('demo-banner').style.display = 'block';
  document.getElementById('send-btn').disabled = true;
  document.getElementById('user-input').placeholder = '演示模式下 AI 功能已禁用';
}

document.getElementById('auth-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAuth();
});

// ── 检查是否已有 token（刷新免重输）
window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('cli_token')) {
    document.getElementById('auth-overlay').classList.add('hidden');
  }
});

// ── State ─────────────────────────────────────────────
let currentTab = 'regression';
let history = [];   // 对话历史，传给 DeepSeek 保持上下文

// ── DOM ───────────────────────────────────────────────
const chatBox   = document.getElementById('chat-box');
const inputEl   = document.getElementById('user-input');
const sendBtn   = document.getElementById('send-btn');
const vizWrap   = document.getElementById('viz-wrap');
const vizCanvas = document.getElementById('viz-canvas');
const vizTitle  = document.getElementById('viz-title');
const vizInfo   = document.getElementById('viz-info');
const hintChips = document.getElementById('hint-chips');

// ── Tabs ──────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tool;
    renderChips(TAB_CHIPS[currentTab]);
    vizWrap.style.display = 'none';
  });
});

function setActiveTab(tabName) {
  currentTab = tabName;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tool === tabName));
  renderChips(TAB_CHIPS[tabName]);
}

function renderChips(chips) {
  hintChips.innerHTML = '';
  chips.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = c;
    btn.onclick = () => { inputEl.value = c; inputEl.focus(); };
    hintChips.appendChild(btn);
  });
}

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Chat bubble ───────────────────────────────────────
function addBubble(role, html, showLLMTag = false) {
  const wrap  = document.createElement('div');
  wrap.className = `bubble ${role}`;
  const label = document.createElement('div');
  label.className = 'bubble-label';
  label.textContent = role === 'user' ? 'YOU' : 'CLI-AGENT';
  wrap.appendChild(label);
  if (showLLMTag) {
    const tag = document.createElement('div');
    tag.className = 'llm-tag';
    tag.textContent = '⚡ DeepSeek Function Calling';
    wrap.appendChild(tag);
  }
  const body = document.createElement('div');
  body.innerHTML = html;
  wrap.appendChild(body);
  chatBox.appendChild(wrap);
  chatBox.scrollTop = chatBox.scrollHeight;
  return wrap;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function formatResult(text) {
  const marker = '已调用统计CLI：';
  const idx = text.indexOf(marker);
  if (idx !== -1) {
    return escHtml(text.slice(0, idx + marker.length)) + `<pre>${escHtml(text.slice(idx + marker.length).trim())}</pre>`;
  }
  return escHtml(text);
}

// ── Send → DeepSeek → dispatch ────────────────────────
async function sendMessage() {
  const msg = inputEl.value.trim();
  if (!msg) return;
  inputEl.value = '';
  sendBtn.disabled = true;

  addBubble('user', escHtml(msg));
  const thinkBubble = addBubble('bot', '<em style="color:var(--muted)">DeepSeek 理解中…</em>');

  // 保存到历史
  history.push({ role: 'user', content: msg });
  // 只保留最近 10 轮，避免 token 过多
  if (history.length > 20) history = history.slice(-20);

  try {
    const res = await fetch('/.netlify/functions/llm', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-access-token': sessionStorage.getItem('cli_token') || ''
      },
      body: JSON.stringify({ message: msg, history: history.slice(0, -1) })
    });
    const data = await res.json();

    if (data.error === 'ACCESS_DENIED') {
      sessionStorage.removeItem('cli_token');
      thinkBubble.querySelector('div:last-child').innerHTML =
        '<span style="color:#f85149">访问码错误或已失效，请刷新页面重新输入。</span>';
      sendBtn.disabled = false;
      return;
    }

    if (data.error) {
      thinkBubble.querySelector('div:last-child').innerHTML =
        `<span style="color:#f85149">错误：${escHtml(data.error)}</span>`;
      sendBtn.disabled = false;
      return;
    }

    if (data.type === 'tool_call') {
      // DeepSeek 决定调用某个工具
      const { tool, args } = data;
      const meta = TOOL_META[tool];
      if (meta) setActiveTab(meta.tab);

      // pipeline 数据优先注入
      if (window._pipelineData) {
        if (tool === 'run_regression' || tool === 'run_scatter') {
          args._x = window._pipelineData.x;
          args._y = window._pipelineData.y;
          args._labels = window._pipelineData.labels;
        }
        if (tool === 'run_arima') {
          args._y = window._pipelineData.y;
          args._periods = window._pipelineData.labels;
        }
      }

      const result = await runTool(tool, args);
      thinkBubble.querySelector('div:last-child').innerHTML = formatResult(result.reply);
      thinkBubble.querySelector('.bubble-label').insertAdjacentHTML('afterend',
        '<div class="llm-tag">⚡ DeepSeek → ' + (meta?.label || tool) + '</div>');
      if (result.draw) result.draw();

      // 追加 assistant 回复到历史
      history.push({ role: 'assistant', content: result.reply });

    } else {
      // 普通文本回复（不是工具调用）
      thinkBubble.querySelector('div:last-child').innerHTML = escHtml(data.reply);
      history.push({ role: 'assistant', content: data.reply });
    }

  } catch (err) {
    thinkBubble.querySelector('div:last-child').innerHTML =
      `<span style="color:#f85149">网络错误：${escHtml(err.message)}</span>`;
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

// ══════════════════════════════════════════════════════
// 工具执行层（纯前端计算）
// ══════════════════════════════════════════════════════
async function runTool(name, args) {
  switch (name) {
    case 'run_regression':   return runRegression(args);
    case 'run_logistic':     return runLogistic();
    case 'run_discriminant': return runDiscriminant();
    case 'run_kmeans':       return runKMeans(args.k || 3);
    case 'run_normal':       return runNormal(args.mu ?? 0, args.sig ?? 1);
    case 'run_poisson':      return runPoisson(args.lambda ?? 3);
    case 'run_binomial':     return runBinomial(args.n ?? 10, args.p ?? 0.5);
    case 'run_custom_plot':  return runCustomPlot(args);
    case 'run_scatter':      return runScatter(args);
    case 'run_arima':        return runArima(args);
    case 'run_panel':        return runPanel(args);
    case 'fetch_bea_data':   return await runBeaFetch(args);
    default: return { reply: `未知工具：${name}` };
  }
}

// ══════════════════════════════════════════════════════
// ① 线性回归
// ══════════════════════════════════════════════════════
function runRegression(args) {
  args = args || {};
  // 优先使用 pipeline 注入的真实数据；否则使用演示数据
  let X, Y, labels, isReal;
  if (args._x && args._y && args._x.length >= 2) {
    X      = args._x;
    Y      = args._y;
    labels = args._labels || X.map((_,i) => String(i+1));
    isReal = true;
  } else {
    // 演示数据（仅在无 pipeline 时使用）
    X      = [1,2,3,4,5,6];
    Y      = [2.1,3.9,5.3,7.8,9.2,11.1];
    labels = X.map(String);
    isReal = false;
  }

  const n=X.length, xm=mean(X), ym=mean(Y);
  let num=0,den=0;
  for(let i=0;i<n;i++){num+=(X[i]-xm)*(Y[i]-ym);den+=(X[i]-xm)**2;}
  const b1=num/den, b0=ym-b1*xm;
  const yH=X.map(x=>b1*x+b0);
  const ssTot=Y.reduce((s,y)=>s+(y-ym)**2,0);
  const ssRes=Y.reduce((s,y,i)=>s+(y-yH[i])**2,0);
  const r2=1-ssRes/ssTot, se=Math.sqrt(ssRes/(n-2));
  const dataNote = isReal ? '' : '\n（演示数据）';
  const reply=`已调用统计CLI：\n斜率 b₁  = ${b1.toFixed(4)}\n截距 b₀  = ${b0.toFixed(4)}\nR²       = ${r2.toFixed(4)}\n标准误差  = ${se.toFixed(4)}\n样本量 n  = ${n}${dataNote}`;
  return {reply, draw:()=>{
    setupViz('线性回归 · 散点图 + 拟合直线',`斜率 b₁：<span>${b1.toFixed(4)}</span> &nbsp; 截距 b₀：<span>${b0.toFixed(4)}</span> &nbsp; R²：<span>${r2.toFixed(4)}</span>`);
    const {ctx,ml,mt,cw,ch}=getCtx();
    // 动态坐标轴范围（适配真实数据）
    const xPad=(Math.max(...X)-Math.min(...X))*0.1||1;
    const yPad=(Math.max(...Y)-Math.min(...Y))*0.12||1;
    const xMin=Math.min(...X)-xPad, xMax=Math.max(...X)+xPad;
    const yFitMin=Math.min(b1*xMin+b0,Math.min(...Y))-yPad;
    const yFitMax=Math.max(b1*xMax+b0,Math.max(...Y))+yPad;
    const sx=mkS([xMin,xMax],ml,cw), sy=mkSY([yFitMin,yFitMax],mt,ch);
    drawGrid(ctx,[xMin,xMax],[yFitMin,yFitMax],sx,sy,ml,mt,cw,ch);
    ctx.strokeStyle='#f0883e';ctx.lineWidth=2;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(sx(xMin),sy(b1*xMin+b0));ctx.lineTo(sx(xMax),sy(b1*xMax+b0));ctx.stroke();
    ctx.strokeStyle='#58a6ff33';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    X.forEach((x,i)=>{ctx.beginPath();ctx.moveTo(sx(x),sy(Y[i]));ctx.lineTo(sx(x),sy(b1*x+b0));ctx.stroke();});
    ctx.setLineDash([]);
    X.forEach((x,i)=>dot(ctx,sx(x),sy(Y[i]),'#58a6ff'));
    legend(ctx,ml+8,mt+12,'#f0883e',`ŷ=${b1.toFixed(4)}x+${b0.toFixed(4)}`);
  }};
}

// ② 逻辑分类
// ══════════════════════════════════════════════════════
function sigmoid(z){return 1/(1+Math.exp(-z));}
function runLogistic() {
  const data=[
    {x1:1.2,x2:0.8,y:0},{x1:1.5,x2:1.1,y:0},{x1:0.9,x2:0.6,y:0},
    {x1:1.0,x2:1.4,y:0},{x1:1.8,x2:0.5,y:0},{x1:0.7,x2:0.9,y:0},
    {x1:3.1,x2:2.8,y:1},{x1:3.5,x2:3.2,y:1},{x1:2.9,x2:3.0,y:1},
    {x1:3.3,x2:2.5,y:1},{x1:2.8,x2:3.4,y:1},{x1:3.7,x2:2.9,y:1},
  ];
  let w1=0,w2=0,b=0;
  for(let e=0;e<400;e++){
    let dw1=0,dw2=0,db=0;
    data.forEach(d=>{const err=sigmoid(w1*d.x1+w2*d.x2+b)-d.y;dw1+=err*d.x1;dw2+=err*d.x2;db+=err;});
    w1-=0.3*dw1/data.length;w2-=0.3*dw2/data.length;b-=0.3*db/data.length;
  }
  const acc=data.filter(d=>(sigmoid(w1*d.x1+w2*d.x2+b)>=0.5?1:0)===d.y).length/data.length;
  const reply=`已调用统计CLI：\n算法     = Logistic Regression（梯度下降）\n权重 w₁  = ${w1.toFixed(4)}\n权重 w₂  = ${w2.toFixed(4)}\n偏置 b   = ${b.toFixed(4)}\n训练准确率 = ${(acc*100).toFixed(1)}%\n样本量 n  = ${data.length}`;
  return {reply, draw:()=>{
    setupViz('逻辑分类 · 决策边界',`准确率：<span>${(acc*100).toFixed(1)}%</span>`);
    const {ctx,ml,mt,cw,ch}=getCtx();
    const sx=mkS([0,5],ml,cw), sy=mkSY([0,5],mt,ch);
    drawGrid(ctx,[0,5],[0,5],sx,sy,ml,mt,cw,ch);
    if(Math.abs(w2)>1e-6){
      ctx.strokeStyle='#e3b341';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
      ctx.beginPath();ctx.moveTo(sx(0),sy(-(w1*0+b)/w2));ctx.lineTo(sx(5),sy(-(w1*5+b)/w2));ctx.stroke();ctx.setLineDash([]);
    }
    data.forEach(d=>dot(ctx,sx(d.x1),sy(d.x2),d.y===0?'#58a6ff':'#ff7b72'));
    legend(ctx,ml+8,mt+12,'#58a6ff','类别 0');
    legend(ctx,ml+8,mt+26,'#ff7b72','类别 1');
    legend(ctx,ml+8,mt+40,'#e3b341','决策边界',true);
  }};
}

// ③ 线性判别 LDA
// ══════════════════════════════════════════════════════
function runDiscriminant() {
  const c0=[[2.0,1.8],[2.5,2.1],[1.8,2.3],[2.2,1.5],[2.8,2.0]];
  const c1=[[4.5,4.2],[4.8,4.5],[4.2,4.8],[5.0,4.0],[4.6,4.7]];
  const m0=[mean(c0.map(p=>p[0])),mean(c0.map(p=>p[1]))];
  const m1=[mean(c1.map(p=>p[0])),mean(c1.map(p=>p[1]))];
  const sw=[[0,0],[0,0]];
  [c0,c1].forEach((cls,ci)=>{
    const mu=ci===0?m0:m1;
    cls.forEach(p=>{sw[0][0]+=(p[0]-mu[0])**2;sw[0][1]+=(p[0]-mu[0])*(p[1]-mu[1]);sw[1][0]+=(p[1]-mu[1])*(p[0]-mu[0]);sw[1][1]+=(p[1]-mu[1])**2;});
  });
  const det=sw[0][0]*sw[1][1]-sw[0][1]*sw[1][0];
  const si=[[sw[1][1]/det,-sw[0][1]/det],[-sw[1][0]/det,sw[0][0]/det]];
  const dm=[m1[0]-m0[0],m1[1]-m0[1]];
  const w=[si[0][0]*dm[0]+si[0][1]*dm[1],si[1][0]*dm[0]+si[1][1]*dm[1]];
  const wn=Math.sqrt(w[0]**2+w[1]**2);
  const ww=[w[0]/wn,w[1]/wn];
  const thresh=w[0]*(m0[0]+m1[0])/2+w[1]*(m0[1]+m1[1])/2;
  const all=c0.map(p=>({p,y:0})).concat(c1.map(p=>({p,y:1})));
  const acc=all.filter(({p,y})=>(w[0]*p[0]+w[1]*p[1]>=thresh?1:0)===y).length/all.length;
  const reply=`已调用统计CLI：\n算法       = Fisher 线性判别分析（LDA）\n判别方向 w = [${ww[0].toFixed(3)}, ${ww[1].toFixed(3)}]\n类均值 μ₀  = [${m0.map(v=>v.toFixed(2)).join(', ')}]\n类均值 μ₁  = [${m1.map(v=>v.toFixed(2)).join(', ')}]\n判别准确率 = ${(acc*100).toFixed(1)}%`;
  return {reply, draw:()=>{
    setupViz('线性判别 LDA · 判别边界',`准确率：<span>${(acc*100).toFixed(1)}%</span>`);
    const {ctx,ml,mt,cw,ch}=getCtx();
    const sx=mkS([0,7],ml,cw), sy=mkSY([0,7],mt,ch);
    drawGrid(ctx,[0,7],[0,7],sx,sy,ml,mt,cw,ch);
    if(Math.abs(w[1])>1e-6){
      ctx.strokeStyle='#bc8cff';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
      ctx.beginPath();ctx.moveTo(sx(0),sy((thresh-w[0]*0)/w[1]));ctx.lineTo(sx(7),sy((thresh-w[0]*7)/w[1]));ctx.stroke();ctx.setLineDash([]);
    }
    c0.forEach(p=>dot(ctx,sx(p[0]),sy(p[1]),'#58a6ff'));
    c1.forEach(p=>dot(ctx,sx(p[0]),sy(p[1]),'#ff7b72'));
    dot(ctx,sx(m0[0]),sy(m0[1]),'#58a6ff',8,'#fff');
    dot(ctx,sx(m1[0]),sy(m1[1]),'#ff7b72',8,'#fff');
    legend(ctx,ml+8,mt+12,'#58a6ff','类别 0');
    legend(ctx,ml+8,mt+26,'#ff7b72','类别 1');
    legend(ctx,ml+8,mt+40,'#bc8cff','判别边界',true);
  }};
}

// ══════════════════════════════════════════════════════
// ④ K-均值聚类
// ══════════════════════════════════════════════════════
function randn(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
const CCOLORS=['#58a6ff','#ff7b72','#3fb950','#e3b341','#bc8cff'];

function runKMeans(K=3) {
  K=Math.min(5,Math.max(1,K));
  const centers=[[1.5,1.5],[4,4],[7,2],[2,6],[6,6]].slice(0,K);
  const data=[];
  centers.forEach(c=>{for(let i=0;i<8;i++)data.push({x:c[0]+randn()*0.7,y:c[1]+randn()*0.7});});
  let cents=centers.map(c=>[...c]), labels=new Array(data.length).fill(0);
  for(let it=0;it<20;it++){
    labels=data.map(p=>{let best=0,bd=Infinity;cents.forEach((c,ci)=>{const d=(p.x-c[0])**2+(p.y-c[1])**2;if(d<bd){bd=d;best=ci;}});return best;});
    cents=cents.map((_,ci)=>{const pts=data.filter((_,i)=>labels[i]===ci);return pts.length?[mean(pts.map(p=>p.x)),mean(pts.map(p=>p.y))]:cents[ci];});
  }
  const inertia=data.reduce((s,p,i)=>s+(p.x-cents[labels[i]][0])**2+(p.y-cents[labels[i]][1])**2,0);
  const reply=`已调用统计CLI：\n算法     = K-Means（Lloyd 迭代）\nK        = ${K}\n`+
    cents.map((c,i)=>`质心 C${i+1}  = [${c[0].toFixed(2)}, ${c[1].toFixed(2)}]`).join('\n')+
    `\n簇内惯性  = ${inertia.toFixed(4)}\n样本量 n  = ${data.length}`;
  return {reply, draw:()=>{
    setupViz(`K-均值聚类 · K=${K}`,cents.map((c,i)=>`C${i+1}：<span>[${c[0].toFixed(2)},${c[1].toFixed(2)}]</span>`).join(' &nbsp; '));
    const {ctx,ml,mt,cw,ch}=getCtx();
    const sx=mkS([0,9],ml,cw), sy=mkSY([0,9],mt,ch);
    drawGrid(ctx,[0,9],[0,9],sx,sy,ml,mt,cw,ch);
    data.forEach((p,i)=>dot(ctx,sx(p.x),sy(p.y),CCOLORS[labels[i]]));
    cents.forEach((c,ci)=>{
      ctx.beginPath();ctx.arc(sx(c[0]),sy(c[1]),9,0,Math.PI*2);
      ctx.fillStyle=CCOLORS[ci];ctx.globalAlpha=0.22;ctx.fill();ctx.globalAlpha=1;
      ctx.strokeStyle=CCOLORS[ci];ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(sx(c[0]),sy(c[1]),7,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='bold 9px JetBrains Mono,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(`C${ci+1}`,sx(c[0]),sy(c[1]));
    });
  }};
}

// ══════════════════════════════════════════════════════
// ⑤ 概率计算
// ══════════════════════════════════════════════════════
function normalPDF(x,mu,sig){return Math.exp(-0.5*((x-mu)/sig)**2)/(sig*Math.sqrt(2*Math.PI));}
function normalCDF(z){const t=1/(1+0.2316419*Math.abs(z)),d=0.3989423*Math.exp(-z*z/2),p=d*t*(0.3193815+t*(-0.3565638+t*(1.7814779+t*(-1.8212560+t*1.3302744))));return z>=0?1-p:p;}

function runNormal(mu=0,sig=1) {
  sig=Math.max(0.01,sig);
  const p1=normalCDF(1)-normalCDF(-1), p2=normalCDF(2)-normalCDF(-2);
  const reply=`已调用统计CLI：\n分布     = 正态分布 N(μ, σ²)\nμ        = ${mu}\nσ        = ${sig}\nP(μ±1σ)  = ${(p1*100).toFixed(2)}%\nP(μ±2σ)  = ${(p2*100).toFixed(2)}%\nP(μ±3σ)  ≈ 99.73%`;
  return {reply, draw:()=>{
    setupViz('正态分布 · 概率密度曲线',`μ = <span>${mu}</span> &nbsp; σ = <span>${sig}</span>`);
    const {ctx,ml,mt,cw,ch}=getCtx();
    const xMin=mu-4*sig,xMax=mu+4*sig,yMax=normalPDF(mu,mu,sig)*1.28;
    const sx=mkS([xMin,xMax],ml,cw), sy=mkSY([0,yMax],mt,ch);
    drawGrid(ctx,[xMin,xMax],[0,yMax],sx,sy,ml,mt,cw,ch,8,4);
    ctx.fillStyle='#f0883e22';ctx.beginPath();ctx.moveTo(sx(mu-sig),sy(0));
    for(let xi=mu-sig;xi<=mu+sig;xi+=(2*sig)/100)ctx.lineTo(sx(xi),sy(normalPDF(xi,mu,sig)));
    ctx.lineTo(sx(mu+sig),sy(0));ctx.closePath();ctx.fill();
    [[mu-2*sig,mu-sig],[mu+sig,mu+2*sig]].forEach(([a,b])=>{
      ctx.fillStyle='#58a6ff11';ctx.beginPath();ctx.moveTo(sx(a),sy(0));
      for(let xi=a;xi<=b;xi+=(b-a)/60)ctx.lineTo(sx(xi),sy(normalPDF(xi,mu,sig)));
      ctx.lineTo(sx(b),sy(0));ctx.closePath();ctx.fill();
    });
    ctx.strokeStyle='#f0883e';ctx.lineWidth=2.5;ctx.setLineDash([]);
    ctx.beginPath();let first=true;
    for(let xi=xMin;xi<=xMax;xi+=(xMax-xMin)/300){
      const py=sy(normalPDF(xi,mu,sig));first?ctx.moveTo(sx(xi),py):ctx.lineTo(sx(xi),py);first=false;
    }
    ctx.stroke();
    [-2,-1,1,2].forEach(k=>{ctx.strokeStyle='#30363d';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(sx(mu+k*sig),mt);ctx.lineTo(sx(mu+k*sig),mt+ch);ctx.stroke();});
    ctx.setLineDash([]);
    ctx.fillStyle='#8b949e';ctx.font='10px JetBrains Mono,monospace';ctx.textAlign='center';
    [-2,-1,0,1,2].forEach(k=>ctx.fillText(k===0?'μ':(k>0?`μ+${k}σ`:`μ${k}σ`),sx(mu+k*sig),mt+ch+16));
  }};
}

function poissonPMF(k,l){let lp=-l+k*Math.log(l+1e-15);for(let i=1;i<=k;i++)lp-=Math.log(i);return k===0?Math.exp(-l):Math.exp(lp);}

function runPoisson(lambda=3) {
  lambda=Math.max(0.01,lambda);
  const kMax=Math.max(14,Math.ceil(lambda*2.5));
  const probs=Array.from({length:kMax+1},(_,k)=>poissonPMF(k,lambda));
  const reply=`已调用统计CLI：\n分布     = 泊松分布 Poisson(λ)\nλ        = ${lambda}\n均值 E[X] = ${lambda.toFixed(2)}\n方差 D[X] = ${lambda.toFixed(2)}\nP(X=0)   = ${probs[0].toFixed(4)}\nP(X=1)   = ${(probs[1]||0).toFixed(4)}\nP(X≤⌊λ⌋) = ${probs.slice(0,Math.floor(lambda)+1).reduce((a,b)=>a+b,0).toFixed(4)}`;
  return {reply, draw:()=>drawBars(probs,Math.min(kMax,18),lambda,'#58a6ff',`泊松分布 · λ=${lambda}`,`λ = <span>${lambda}</span>`)};
}

function binomPMF(k,n,p){let c=1;for(let i=0;i<Math.min(k,n-k);i++)c=c*(n-i)/(i+1);return c*Math.pow(p,k)*Math.pow(1-p,n-k);}

function runBinomial(n=10,p=0.5) {
  n=Math.max(1,n); p=Math.min(0.999,Math.max(0.001,p));
  const probs=Array.from({length:n+1},(_,k)=>binomPMF(k,n,p));
  const mu=n*p, v=n*p*(1-p);
  const reply=`已调用统计CLI：\n分布     = 二项分布 B(n, p)\nn        = ${n}\np        = ${p}\n均值 E[X] = np = ${mu.toFixed(2)}\n方差 D[X] = np(1-p) = ${v.toFixed(2)}\nP(X=0)   = ${probs[0].toFixed(4)}\nP(X=n)   = ${probs[n].toFixed(4)}\nP(X=⌊μ⌋) = ${probs[Math.floor(mu)].toFixed(4)}`;
  return {reply, draw:()=>drawBars(probs,Math.min(n,20),mu,'#3fb950',`二项分布 · n=${n}, p=${p}`,`np = <span>${mu.toFixed(2)}</span> &nbsp; np(1-p) = <span>${v.toFixed(2)}</span>`)};
}

function drawBars(probs,showN,mu,color,title,info) {
  setupViz(title,info);
  const {ctx,ml,mt,cw,ch}=getCtx();
  const yMax=Math.max(...probs.slice(0,showN+1))*1.28;
  const bw=cw/(showN+2);
  [0.1,0.2,0.3].filter(v=>v<=yMax).forEach(v=>{
    const y=mt+ch-(v/yMax)*ch;
    ctx.strokeStyle='#21262d';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(ml,y);ctx.lineTo(ml+cw,y);ctx.stroke();
    ctx.fillStyle='#8b949e';ctx.font='10px JetBrains Mono,monospace';ctx.textAlign='right';ctx.fillText(v.toFixed(1),ml-4,y+3);
  });
  probs.slice(0,showN+1).forEach((p,k)=>{
    const bx=ml+(k+0.5)*bw, bh=(p/yMax)*ch, by=mt+ch-bh;
    ctx.fillStyle=Math.round(mu)===k?'#e3b341':color+'88';ctx.fillRect(bx-bw*0.35,by,bw*0.7,bh);
    ctx.strokeStyle=color;ctx.lineWidth=1;ctx.strokeRect(bx-bw*0.35,by,bw*0.7,bh);
    ctx.fillStyle='#8b949e';ctx.font='9px JetBrains Mono,monospace';ctx.textAlign='center';ctx.fillText(k,bx,mt+ch+14);
  });
  ctx.strokeStyle='#30363d';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(ml,mt);ctx.lineTo(ml,mt+ch);ctx.lineTo(ml+cw,mt+ch);ctx.stroke();
}

// ══════════════════════════════════════════════════════
function setupViz(t,i){vizTitle.textContent=t;vizInfo.innerHTML=i;vizWrap.style.display='block';}
function getCtx(){
  const dpr=window.devicePixelRatio||1,W=vizCanvas.parentElement.clientWidth-36,H=240;
  vizCanvas.style.width=W+'px';vizCanvas.style.height=H+'px';
  vizCanvas.width=W*dpr;vizCanvas.height=H*dpr;
  const ctx=vizCanvas.getContext('2d');ctx.scale(dpr,dpr);
  return {ctx,W,H,ml:44,mr:16,mt:14,mb:36,cw:W-60,ch:H-50};
}
function mkS([a,b],off,span){return v=>off+(v-a)/(b-a)*span;}
function mkSY([a,b],mt,ch){return v=>mt+ch-(v-a)/(b-a)*ch;}
function drawGrid(ctx,xE,yE,sx,sy,ml,mt,cw,ch,nx=5,ny=5){
  ctx.clearRect(0,0,vizCanvas.width,vizCanvas.height);
  ctx.strokeStyle='#21262d';ctx.lineWidth=1;
  for(let i=0;i<=nx;i++){
    const x=xE[0]+(xE[1]-xE[0])*i/nx;
    ctx.beginPath();ctx.moveTo(sx(x),mt);ctx.lineTo(sx(x),mt+ch);ctx.stroke();
    ctx.fillStyle='#8b949e';ctx.font='10px JetBrains Mono,monospace';ctx.textAlign='center';ctx.fillText(+x.toFixed(1),sx(x),mt+ch+16);
  }
  for(let i=0;i<=ny;i++){
    const y=yE[0]+(yE[1]-yE[0])*i/ny;
    ctx.beginPath();ctx.moveTo(ml,sy(y));ctx.lineTo(ml+cw,sy(y));ctx.stroke();
    ctx.fillStyle='#8b949e';ctx.font='10px JetBrains Mono,monospace';ctx.textAlign='right';ctx.fillText(+y.toFixed(1),ml-5,sy(y)+3);
  }
  ctx.strokeStyle='#30363d';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(ml,mt);ctx.lineTo(ml,mt+ch);ctx.lineTo(ml+cw,mt+ch);ctx.stroke();
}
function dot(ctx,x,y,fill,r=5,stroke='#0d1117'){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.stroke();}
function legend(ctx,x,y,color,label,dashed=false){ctx.save();if(dashed)ctx.setLineDash([4,3]);ctx.strokeStyle=color;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+16,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#8b949e';ctx.font='10px JetBrains Mono,monospace';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(label,x+20,y);ctx.restore();}

// 辅助数学函数（供 DeepSeek 生成的代码调用）
function gamma(n) {
  if (n < 0.5) return Math.PI / (Math.sin(Math.PI * n) * gamma(1 - n));
  n -= 1;
  const g = 7;
  const c = [0.99999999999980993,676.5203681218851,-1259.1392167224028,
    771.32342877765313,-176.61502916214059,12.507343278686905,
    -0.13857109526572012,9.9843695780195716e-6,1.5056327351493116e-7];
  let x = c[0];
  for (let i = 1; i < g + 2; i++) x += c[i] / (n + i);
  const t = n + g + 0.5;
  return Math.sqrt(2 * Math.PI) * Math.pow(t, n + 0.5) * Math.exp(-t) * x;
}
function lnGamma(n) {
  if (n < 0.5) return Math.log(Math.PI / Math.sin(Math.PI * n)) - lnGamma(1 - n);
  n -= 1;
  const g = 7;
  const c = [0.99999999999980993,676.5203681218851,-1259.1392167224028,
    771.32342877765313,-176.61502916214059,12.507343278686905,
    -0.13857109526572012,9.9843695780195716e-6,1.5056327351493116e-7];
  let x = c[0];
  for (let i = 1; i < g + 2; i++) x += c[i] / (n + i);
  const t = n + g + 0.5;
  return 0.5*Math.log(2*Math.PI) + (n+0.5)*Math.log(t) - t + Math.log(x);
}
function betaFn(a,b){return gamma(a)*gamma(b)/gamma(a+b);}

function runCustomPlot(args) {
  const {
    title, info, plot_type, x_min, x_max, y_max: y_max_hint,
    pdf_js, description, curves
  } = args;

  const CURVE_COLORS = ['#bc8cff','#f0883e','#3fb950','#58a6ff','#ff7b72','#e3b341'];

  let curveList = [];
  if (curves && Array.isArray(curves) && curves.length > 0) {
    curves.forEach(function(c, i) {
      let fn;
      try { fn = new Function('x','gamma','lnGamma','betaFn', c.pdf_js); } catch(e) { fn = function(){return 0;}; }
      curveList.push({ label: c.label || ('曲线'+(i+1)), color: c.color || CURVE_COLORS[i % CURVE_COLORS.length], fn: fn });
    });
  } else if (pdf_js) {
    let fn;
    try { fn = new Function('x','gamma','lnGamma','betaFn', pdf_js); }
    catch(e) { return { reply: '已调用统计CLI：\n动态绘图代码编译失败：' + e.message }; }
    curveList.push({ label: title, color: CURVE_COLORS[0], fn: fn });
  } else {
    return { reply: '已调用统计CLI：\n缺少绘图代码' };
  }

  // safePdf: 对奇点钳制，单点上限设为 1e6，防止 Infinity 污染采样
  const safePdf = function(fn, x) {
    try {
      var v = fn(x, gamma, lnGamma, betaFn);
      if (!isFinite(v) || v < 0 || isNaN(v)) return 0;
      return Math.min(v, 1e6);
    } catch(e) { return 0; }
  };

  // 自动计算 y_max：
  // 1. 跳过最左侧 5% 区间（卡方 k=1 等在 x→0 处为 ∞）
  // 2. 取剩余采样的 90th 百分位 × 1.4
  // 3. 若 y_max_hint 有效则直接使用
  var STEPS = 500;
  var xSkip = x_min + (x_max - x_min) * 0.05;   // 跳过左侧 5%
  var xStart = xSkip;
  var dx = (x_max - xStart) / STEPS;
  var samples = [];
  curveList.forEach(function(c) {
    for (var i = 1; i <= STEPS; i++) {
      var v = safePdf(c.fn, xStart + i * dx);
      if (v > 0 && v < 1e6) samples.push(v);
    }
  });
  samples.sort(function(a,b){return a-b;});
  var p90 = samples.length > 0 ? samples[Math.floor(samples.length * 0.90)] : 0.5;
  var autoYmax = p90 * 1.4;
  var y_max = (y_max_hint && y_max_hint > 0) ? y_max_hint : (autoYmax > 0 ? autoYmax : 0.5);

  var descText = description || '';
  var reply = '已调用统计CLI：\n' + title + (descText ? '\n' + descText : '');

  return { reply: reply, draw: function() {
    setupViz(title, info || '');
    var g = getCtx();
    var ctx = g.ctx, ml = g.ml, mt = g.mt, cw = g.cw, ch = g.ch;
    var sx = mkS([x_min, x_max], ml, cw);
    var sy = mkSY([0, y_max], mt, ch);
    drawGrid(ctx, [x_min, x_max], [0, y_max], sx, sy, ml, mt, cw, ch, 8, 5);

    if (plot_type === 'bars') {
      var nSteps = Math.min(Math.round(x_max - x_min), 30);
      var bw = cw / (nSteps + 2) / (curveList.length || 1);
      curveList.forEach(function(c, ci) {
        for (var k = 0; k <= nSteps; k++) {
          var x = x_min + k;
          var p = safePdf(c.fn, x);
          var bh = Math.max(0, (p / y_max) * ch);
          var bx = ml + (k + 1) * cw / (nSteps + 2) + (ci - (curveList.length - 1) / 2) * bw;
          ctx.fillStyle = c.color + '88';
          ctx.fillRect(bx - bw * 0.4, mt + ch - bh, bw * 0.8, bh);
          ctx.strokeStyle = c.color; ctx.lineWidth = 1;
          ctx.strokeRect(bx - bw * 0.4, mt + ch - bh, bw * 0.8, bh);
          if (ci === 0) {
            ctx.fillStyle = '#8b949e';
            ctx.font = '9px JetBrains Mono,monospace';
            ctx.textAlign = 'center';
            ctx.fillText(x, bx, mt + ch + 14);
          }
        }
      });
    } else {
      // 绘图从 x_min 极小偏移处开始，y 值钳制在 y_max 内，避免奇点溢出
      var xDraw = x_min + (x_max - x_min) * 0.001;
      var dxDraw = (x_max - xDraw) / STEPS;
      var clamp = function(v) { return Math.min(Math.max(v, 0), y_max); };

      if (curveList.length === 1) {
        var c0 = curveList[0];
        ctx.fillStyle = c0.color + '15';
        ctx.beginPath(); ctx.moveTo(sx(xDraw), sy(0));
        for (var i = 0; i <= STEPS; i++) {
          var xi = xDraw + i * dxDraw;
          ctx.lineTo(sx(xi), sy(clamp(safePdf(c0.fn, xi))));
        }
        ctx.lineTo(sx(x_max), sy(0)); ctx.closePath(); ctx.fill();
      }
      curveList.forEach(function(c) {
        ctx.strokeStyle = c.color; ctx.lineWidth = 2; ctx.setLineDash([]);
        ctx.beginPath();
        var first = true;
        for (var i = 0; i <= STEPS; i++) {
          var xi = xDraw + i * dxDraw;
          var py = sy(clamp(safePdf(c.fn, xi)));
          if (first) { ctx.moveTo(sx(xi), py); first = false; }
          else { ctx.lineTo(sx(xi), py); }
        }
        ctx.stroke();
      });
    }
    curveList.forEach(function(c, i) {
      legend(ctx, ml + 8, mt + 12 + i * 14, c.color, c.label);
    });
  }};
}

// ⑦ 散点图
// ══════════════════════════════════════════════════════
function runScatter(args) {
  args = args || {};
  let X, Y, labels, isReal;
  if ((args._x || args.x) && (args._y || args.y)) {
    X      = args._x || args.x;
    Y      = args._y || args.y;
    labels = args._labels || X.map((_,i)=>String(i+1));
    isReal = !!args._x;
  } else {
    // 演示数据：模拟两变量正相关散点
    X      = [1.2,2.1,2.8,3.5,4.2,5.0,5.8,6.3,7.1,7.9,8.4,9.2];
    Y      = [1.8,2.9,2.5,4.1,4.8,5.5,5.2,6.9,7.3,7.8,8.6,9.5];
    labels = X.map(String);
    isReal = false;
  }
  const fitLine = args.fit_line !== false;
  const n = X.length;
  const xm = mean(X), ym = mean(Y);
  let num=0, den=0;
  for(let i=0;i<n;i++){num+=(X[i]-xm)*(Y[i]-ym); den+=(X[i]-xm)**2;}
  const b1 = den>0 ? num/den : 0;
  const b0 = ym - b1*xm;
  const yH = X.map(x=>b1*x+b0);
  const ssTot = Y.reduce((s,y)=>s+(y-ym)**2,0);
  const ssRes = Y.reduce((s,y,i)=>s+(y-yH[i])**2,0);
  const r2 = ssTot>0 ? 1-ssRes/ssTot : 0;
  // 相关系数
  const stdX = Math.sqrt(X.reduce((s,x)=>s+(x-xm)**2,0)/n);
  const stdY = Math.sqrt(Y.reduce((s,y)=>s+(y-ym)**2,0)/n);
  const r = stdX>0&&stdY>0 ? num/(n*stdX*stdY) : 0;
  const dataNote = isReal ? '' : '\n（演示数据）';
  const reply = `已调用统计CLI：\n图表类型  = 散点图${fitLine?' + OLS拟合线':''}\n样本量 n  = ${n}\n相关系数 r = ${r.toFixed(4)}\nR²        = ${r2.toFixed(4)}\n斜率 b₁   = ${b1.toFixed(4)}\n截距 b₀   = ${b0.toFixed(4)}${dataNote}`;
  const xLabel = args.x_label || 'X';
  const yLabel = args.y_label || 'Y';
  const title  = args.title || `散点图 · ${xLabel} vs ${yLabel}`;
  return {reply, draw:()=>{
    setupViz(title, `r = <span>${r.toFixed(4)}</span> &nbsp; R² = <span>${r2.toFixed(4)}</span>&nbsp; n = <span>${n}</span>`);
    const {ctx,ml,mt,cw,ch} = getCtx();
    const xPad = (Math.max(...X)-Math.min(...X))*0.1||1;
    const yPad = (Math.max(...Y)-Math.min(...Y))*0.1||1;
    const xMin = Math.min(...X)-xPad, xMax = Math.max(...X)+xPad;
    const yMin = Math.min(...Y)-yPad, yMax = Math.max(...Y)+yPad;
    const sx = mkS([xMin,xMax],ml,cw), sy = mkSY([yMin,yMax],mt,ch);
    drawGrid(ctx,[xMin,xMax],[yMin,yMax],sx,sy,ml,mt,cw,ch,6,5);
    if(fitLine) {
      ctx.strokeStyle='#f0883e'; ctx.lineWidth=1.8; ctx.setLineDash([5,4]);
      ctx.beginPath(); ctx.moveTo(sx(xMin),sy(b1*xMin+b0)); ctx.lineTo(sx(xMax),sy(b1*xMax+b0)); ctx.stroke();
      ctx.setLineDash([]);
    }
    // 绘制散点，若数据较多则按密度着色
    const baseColor = '#67e8f9';
    X.forEach((x,i) => dot(ctx,sx(x),sy(Y[i]),baseColor,4.5));
    if(fitLine) legend(ctx,ml+8,mt+12,'#f0883e',`ŷ=${b1.toFixed(3)}x+${b0.toFixed(3)}`,true);
    legend(ctx,ml+8,mt+(fitLine?26:12),baseColor,'数据点');
    // X轴标签
    ctx.fillStyle='#8b949e'; ctx.font='9px JetBrains Mono,monospace'; ctx.textAlign='center';
    ctx.fillText(xLabel, ml+cw/2, mt+ch+30);
  }};
}

// ⑧ 时间序列分析（ARIMA识别 + 趋势分解 + 预测 / VAR）
// ══════════════════════════════════════════════════════
function runArima(args) {
  args = args || {};
  const varMode = !!args.var_mode;

  // 使用管道数据或演示数据
  let Y, periods;
  if (args._y && args._y.length >= 6) {
    Y       = args._y;
    periods = args._periods || Y.map((_,i)=>String(i+1));
  } else if (args.y && args.y.length >= 6) {
    Y       = args.y;
    periods = args.periods || Y.map((_,i)=>String(i+1));
  } else {
    // 演示时序：带趋势+季节性
    Y       = [102,115,111,130,125,145,140,162,158,180,177,198,195,220,218,245,242,270,268,300,298,325,322,350];
    periods = Y.map((_,i)=>String(2000+Math.floor(i/4))+'Q'+((i%4)+1));
  }

  const n  = Y.length;
  const p  = Math.min(3, args.p ?? 1);
  const d  = Math.min(2, args.d ?? 1);
  const q  = Math.min(3, args.q ?? 1);
  const h  = Math.min(20, args.forecast ?? 5);

  // 趋势（移动平均）
  const maw = Math.min(6, Math.floor(n/4));
  const trend = Y.map((_,i)=>{
    if(i < maw/2 || i >= n-maw/2) return null;
    let s=0; for(let k=-Math.floor(maw/2);k<=Math.floor(maw/2);k++) s+=Y[i+k];
    return s/(maw+1);
  });

  // 差分序列（1阶）
  const diff1 = Y.slice(1).map((v,i)=>v-Y[i]);

  // 简单ACF（滞后1-5）
  const ym = mean(Y);
  const varY = Y.reduce((s,v)=>s+(v-ym)**2,0)/n;
  const acf = [1,...Array.from({length:5},(_,lag)=>{
    lag+=1;
    let s=0; for(let i=0;i<n-lag;i++) s+=(Y[i]-ym)*(Y[i+lag]-ym);
    return varY>0 ? (s/(n-lag))/varY : 0;
  })];

  // 简单线性外推预测
  const xIdx = Y.map((_,i)=>i+1);
  const xm2  = mean(xIdx), ym2 = mean(Y);
  let num2=0,den2=0; for(let i=0;i<n;i++){num2+=(xIdx[i]-xm2)*(Y[i]-ym2);den2+=(xIdx[i]-xm2)**2;}
  const slope2 = den2>0 ? num2/den2 : 0;
  const int2   = ym2 - slope2*xm2;
  const fcst   = Array.from({length:h},(_,i)=>+(slope2*(n+i+1)+int2).toFixed(2));
  const fcstPeriods = Array.from({length:h},(_,i)=>`t+${i+1}`);

  // 残差标准差
  const resid = Y.map((y,i)=>y-(slope2*(i+1)+int2));
  const se    = Math.sqrt(resid.reduce((s,r)=>s+r*r,0)/(n-2));
  const ci95  = 1.96*se;

  const reply = `已调用统计CLI：\nARIMA(${p},${d},${q}) 时间序列分析\n样本量 n    = ${n}\n趋势斜率   = ${slope2.toFixed(4)}\n残差标准误 = ${se.toFixed(4)}\nACF(1)     = ${acf[1].toFixed(4)}\nACF(2)     = ${acf[2].toFixed(4)}\nACF(5)     = ${acf[5].toFixed(4)}\n预测 +1步  = ${fcst[0]} ± ${ci95.toFixed(2)} (95% CI)\n预测 +${h}步  = ${fcst[h-1]} ± ${(ci95*Math.sqrt(h)).toFixed(2)} (95% CI)`;

  return {reply, draw:()=>{
    setupViz(`时间序列 · ARIMA(${p},${d},${q})`,
      `n = <span>${n}</span> &nbsp; 趋势斜率：<span>${slope2.toFixed(3)}</span> &nbsp; 预测步数：<span>${h}</span>`);
    const {ctx,ml,mt,cw,ch} = getCtx();
    const allY   = [...Y,...fcst];
    const yPad   = (Math.max(...allY)-Math.min(...allY))*0.1||1;
    const yMin2  = Math.min(...allY)-yPad, yMax2 = Math.max(...allY)+yPad;
    const totalN = n+h;
    const sx = mkS([1,totalN],ml,cw), sy = mkSY([yMin2,yMax2],mt,ch);
    drawGrid(ctx,[1,totalN],[yMin2,yMax2],sx,sy,ml,mt,cw,ch,8,5);

    // 趋势线（虚线）
    ctx.strokeStyle='#8b949e'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(sx(1),sy(slope2*1+int2)); ctx.lineTo(sx(n+h),sy(slope2*(n+h)+int2)); ctx.stroke();
    ctx.setLineDash([]);

    // 实际观测折线
    ctx.strokeStyle='#58a6ff'; ctx.lineWidth=2;
    ctx.beginPath(); Y.forEach((y,i)=>i===0?ctx.moveTo(sx(i+1),sy(y)):ctx.lineTo(sx(i+1),sy(y))); ctx.stroke();
    Y.forEach((y,i)=>dot(ctx,sx(i+1),sy(y),'#58a6ff',3));

    // 预测区间（淡色填充）
    ctx.fillStyle='rgba(167,139,250,0.1)';
    ctx.beginPath(); ctx.moveTo(sx(n),sy(Y[n-1]));
    fcst.forEach((f,i)=>ctx.lineTo(sx(n+i+1),sy(f+ci95*Math.sqrt(i+1))));
    for(let i=h-1;i>=0;i--) ctx.lineTo(sx(n+i+1),sy(fcst[i]-ci95*Math.sqrt(i+1)));
    ctx.closePath(); ctx.fill();

    // 预测折线
    ctx.strokeStyle='#a78bfa'; ctx.lineWidth=1.8; ctx.setLineDash([6,3]);
    ctx.beginPath(); ctx.moveTo(sx(n),sy(Y[n-1]));
    fcst.forEach((f,i)=>ctx.lineTo(sx(n+i+1),sy(f))); ctx.stroke();
    ctx.setLineDash([]);

    // 分隔竖线
    ctx.strokeStyle='#30363d'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(sx(n+0.5),mt); ctx.lineTo(sx(n+0.5),mt+ch); ctx.stroke();
    ctx.setLineDash([]);

    // 几个时间轴刻度
    const tickStep = Math.max(1, Math.floor(n/6));
    ctx.fillStyle='#8b949e'; ctx.font='9px JetBrains Mono,monospace'; ctx.textAlign='center';
    for(let i=0;i<n;i+=tickStep) ctx.fillText(periods[i]||String(i+1), sx(i+1), mt+ch+16);
    for(let i=0;i<h;i+=Math.max(1,Math.floor(h/3))) ctx.fillText(fcstPeriods[i], sx(n+i+1), mt+ch+16);

    legend(ctx,ml+8,mt+12,'#58a6ff','观测值');
    legend(ctx,ml+8,mt+26,'#a78bfa','预测值',true);
    legend(ctx,ml+8,mt+40,'#8b949e','趋势线',true);
  }};
}

// ⑨ 面板数据模型（FE / RE / Hausman检验）
// ══════════════════════════════════════════════════════
function runPanel(args) {
  args = args || {};
  const modelType = args.model || 'both';
  const N  = Math.min(10, Math.max(2, args.n_entities || 5));
  const T  = Math.min(12, Math.max(3, args.n_periods  || 6));

  // 生成演示面板数据  y_it = α_i + β*x_it + ε_it
  // α_i 是个体固定效应，β=2（真值），用于验证FE/RE估计
  const rng = (s=>()=>{ s=Math.sin(s)*10000; return s-Math.floor(s); })(42.7);
  const alpha = Array.from({length:N},()=>rng()*4-2);   // 个体效应 ~ U(-2,2)
  const beta_true = 2.0;
  const panels = [];
  for(let i=0;i<N;i++) for(let t=0;t<T;t++){
    const x = rng()*4+1;
    const e = (rng()-0.5)*0.8;
    panels.push({i, t, x, y: alpha[i]+beta_true*x+e});
  }

  // ── 组内去均值（FE 估计）────────────────────────────
  const xBar = Array.from({length:N},(_,i)=>mean(panels.filter(p=>p.i===i).map(p=>p.x)));
  const yBar = Array.from({length:N},(_,i)=>mean(panels.filter(p=>p.i===i).map(p=>p.y)));
  let numFE=0, denFE=0;
  panels.forEach(p=>{numFE+=(p.x-xBar[p.i])*(p.y-yBar[p.i]);denFE+=(p.x-xBar[p.i])**2;});
  const betaFE  = denFE>0 ? numFE/denFE : 0;
  const intFE   = mean(panels.map(p=>p.y)) - betaFE*mean(panels.map(p=>p.x));
  const resFE   = panels.map(p=>p.y - betaFE*p.x - intFE - (yBar[p.i]-betaFE*xBar[p.i]-intFE));
  const sigFE2  = resFE.reduce((s,r)=>s+r*r,0)/(N*(T-1)-1);
  const seFE    = Math.sqrt(sigFE2/denFE);

  // ── 总体OLS（BE/RE近似）───────────────────────────
  const xAll = panels.map(p=>p.x), yAll = panels.map(p=>p.y);
  const xmA = mean(xAll), ymA = mean(yAll);
  let numOLS=0,denOLS=0;
  panels.forEach(p=>{numOLS+=(p.x-xmA)*(p.y-ymA);denOLS+=(p.x-xmA)**2;});
  const betaOLS = denOLS>0 ? numOLS/denOLS : 0;
  const intOLS  = ymA - betaOLS*xmA;
  const resOLS  = panels.map(p=>p.y-betaOLS*p.x-intOLS);
  const sigOLS2 = resOLS.reduce((s,r)=>s+r*r,0)/(N*T-2);
  const seOLS   = Math.sqrt(sigOLS2/denOLS);

  // ── Hausman检验统计量（简化）────────────────────────
  const diffB   = betaFE - betaOLS;
  const varDiff = Math.max(sigFE2/denFE - sigOLS2/denOLS, 1e-8);
  const H_stat  = diffB*diffB/varDiff;
  const p_hausman = H_stat > 3.841 ? '< 0.05 ✓' : '> 0.05';

  // 组内变异 vs 组间变异
  const withinVar = panels.reduce((s,p)=>s+(p.x-xBar[p.i])**2,0)/(N*T);
  const betweenVar= xBar.reduce((s,v)=>s+(v-xmA)**2,0)/N;

  const reply =
    `已调用统计CLI：\n面板数据模型 (N=${N}, T=${T}, NT=${N*T})\n` +
    `─────────────────────────────\n` +
    `固定效应（FE）估计：\n  β̂_FE   = ${betaFE.toFixed(4)}\n  SE(FE) = ${seFE.toFixed(4)}\n  t统计量 = ${Math.abs(betaFE/seFE).toFixed(3)}\n` +
    `─────────────────────────────\n` +
    `随机效应（RE/OLS）估计：\n  β̂_RE   = ${betaOLS.toFixed(4)}\n  SE(RE) = ${seOLS.toFixed(4)}\n` +
    `─────────────────────────────\n` +
    `Hausman 检验：\n  H 统计量 = ${H_stat.toFixed(3)}\n  p 值    ${p_hausman}\n` +
    `  ${H_stat>3.841?'拒绝H₀：存在系统性差异，推荐使用固定效应':'接受H₀：随机效应更有效率'}\n` +
    `─────────────────────────────\n` +
    `组内变异  = ${withinVar.toFixed(4)}\n组间变异  = ${betweenVar.toFixed(4)}\n真实β值   = ${beta_true} （演示数据验证）`;

  return {reply, draw:()=>{
    setupViz(`面板数据模型 · N=${N} T=${T}`,
      `β̂_FE = <span>${betaFE.toFixed(4)}</span> &nbsp; β̂_RE = <span>${betaOLS.toFixed(4)}</span> &nbsp; H = <span>${H_stat.toFixed(3)}</span>`);
    const {ctx,ml,mt,cw,ch} = getCtx();
    const xs = panels.map(p=>p.x), ys = panels.map(p=>p.y);
    const xPad=(Math.max(...xs)-Math.min(...xs))*0.1, yPad=(Math.max(...ys)-Math.min(...ys))*0.1;
    const xMin=Math.min(...xs)-xPad, xMax=Math.max(...xs)+xPad;
    const yMin=Math.min(...ys)-yPad, yMax=Math.max(...ys)+yPad;
    const sx=mkS([xMin,xMax],ml,cw), sy=mkSY([yMin,yMax],mt,ch);
    drawGrid(ctx,[xMin,xMax],[yMin,yMax],sx,sy,ml,mt,cw,ch,6,5);

    // 按个体着色散点
    const entityColors=['#58a6ff','#ff7b72','#3fb950','#e3b341','#bc8cff','#67e8f9','#f0883e','#a78bfa','#86efac','#fca5a5'];
    panels.forEach(p=>dot(ctx,sx(p.x),sy(p.y),entityColors[p.i%entityColors.length],3.5));

    // FE 回归线（橙色实线）
    ctx.strokeStyle='#f0883e'; ctx.lineWidth=2; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(sx(xMin),sy(betaFE*xMin+intFE)); ctx.lineTo(sx(xMax),sy(betaFE*xMax+intFE)); ctx.stroke();

    // OLS/RE 回归线（虚线）
    ctx.strokeStyle='#86efac'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(sx(xMin),sy(betaOLS*xMin+intOLS)); ctx.lineTo(sx(xMax),sy(betaOLS*xMax+intOLS)); ctx.stroke();
    ctx.setLineDash([]);

    legend(ctx,ml+8,mt+12,'#f0883e',`FE: β=${betaFE.toFixed(3)}`);
    legend(ctx,ml+8,mt+26,'#86efac',`RE: β=${betaOLS.toFixed(3)}`,true);

    // Hausman检验结果标注
    const hmsg = H_stat>3.841 ? `H=${H_stat.toFixed(1)} → 推荐FE` : `H=${H_stat.toFixed(1)} → RE有效`;
    ctx.fillStyle = H_stat>3.841 ? '#f0883e' : '#86efac';
    ctx.font = 'bold 10px JetBrains Mono,monospace'; ctx.textAlign='right';
    ctx.fillText(hmsg, ml+cw-4, mt+14);
  }};
}

function mean(arr){return arr.reduce((a,b)=>a+b,0)/arr.length;}

// ⑩ BEA 数据获取（调用 bea-proxy Netlify Function）
// ══════════════════════════════════════════════════════
async function runBeaFetch(args) {
  const { table_name = 'T10101', frequency = 'Q', year = 'X' } = args;
  const tableLabels = { T10101: 'GDP', T20804: 'PCE', T10105: 'GNP' };
  const label = tableLabels[table_name] || table_name;

  try {
    const resp = await fetch(
      `/.netlify/functions/bea-relay?tableName=${table_name}&frequency=${frequency}&year=${year}`
    );
    const json = await resp.json();

    if (json.beaError || (json.error)) {
      return { reply: `已调用统计CLI：\nBEA 数据获取失败：${json.beaError || json.error}` };
    }

    // 模式三直接返回 { data: [...], meta, debug }
    const rows = json.data || [];

    if (!rows.length) {
      return { reply: `已调用统计CLI：\nBEA 返回数据为空（表：${table_name}，频率：${frequency}）` };
    }

    // Line 1 = 总量指标（如GDP总量、PCE总量）
    const series  = rows.filter(r => r.LineNumber === '1');
    const y       = series.map(r => parseFloat((r.DataValue || '0').replace(/,/g, ''))).filter(v => !isNaN(v));
    const periods = series.map(r => r.TimePeriod);
    const unit    = series[0]?.CL_UNIT   || '';
    const metric  = series[0]?.METRIC_NAME || '';

    // 写入全局管道，后续 ARIMA / 散点图可直接使用
    window._pipelineData = {
      x: y.map((_,i) => i + 1),
      y,
      labels: periods,
      cmd: label
    };

    const reply =
      `已调用统计CLI：\nBEA 数据获取成功 ─ ${label}\n` +
      `表名：${table_name}　频率：${frequency}　记录数：${y.length}\n` +
      `指标：${metric}　单位：${unit}\n` +
      `最早：${y[0]?.toLocaleString()}（${periods[0]}）\n` +
      `最新：${y[y.length-1]?.toLocaleString()}（${periods[periods.length-1]}）\n\n` +
      `数据已载入管道，可继续说"帮我做时间序列分析"或"画散点图"。`;

    return {
      reply,
      draw: () => {
        setupViz(
          `BEA · ${label} (${frequency})`,
          `记录：<span>${y.length}</span> 条 &nbsp; 最新：<span>${y[y.length-1]?.toLocaleString()}</span>（${periods[periods.length-1]}）`
        );
        const { ctx, ml, mt, cw, ch } = getCtx();
        const yPad = (Math.max(...y) - Math.min(...y)) * 0.1 || 1;
        const yMin = Math.min(...y) - yPad, yMax = Math.max(...y) + yPad;
        const sx = mkS([0, y.length - 1], ml, cw);
        const sy = mkSY([yMin, yMax], mt, ch);
        drawGrid(ctx, [0, y.length - 1], [yMin, yMax], sx, sy, ml, mt, cw, ch, 6, 5);

        // 折线
        ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 1.8; ctx.setLineDash([]);
        ctx.beginPath();
        y.forEach((v, i) => i === 0 ? ctx.moveTo(sx(i), sy(v)) : ctx.lineTo(sx(i), sy(v)));
        ctx.stroke();

        // 首尾期间标注
        ctx.fillStyle = '#8b949e'; ctx.font = '9px JetBrains Mono,monospace';
        ctx.textAlign = 'left';  ctx.fillText(periods[0],              ml + 2,      mt + ch + 16);
        ctx.textAlign = 'right'; ctx.fillText(periods[periods.length - 1], ml + cw, mt + ch + 16);
        legend(ctx, ml + 8, mt + 12, '#58a6ff', label);
      }
    };
  } catch (err) {
    return { reply: `已调用统计CLI：\nBEA 请求异常：${err.message}` };
  }
}

// ── Init ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  renderChips(TAB_CHIPS['regression']);
  addBubble('bot',
    '欢迎使用 <strong>CLI-Anything 统计多工具台（LLM 驱动版）</strong>。<br>' +
    '现在由 <strong>DeepSeek</strong> 理解您的自然语言，自动识别工具和参数。<br>' +
    '<em style="color:var(--muted)">试试：帮我做线性回归 / K=4聚类 / 泊松分布λ=5</em>'
  );

  // ── 数据管道：读取来自 opencli-gong 的 URL 参数 ──
  const params = new URLSearchParams(window.location.search);
  const raw = params.get('pipeline');
  if (raw) {
    try {
      const { cmd, p, v } = JSON.parse(decodeURIComponent(raw));
      if (p && v && p.length > 0) {
        const nodes = p.map((period, i) => ({ period, value: v[i] }));

        // ── 关键修复：将真实数据存入全局，供 runRegression 使用 ──
        // X 使用序号（1,2,3...），Y 使用实际数值，labels 保留期间标签
        window._pipelineData = {
          x:      nodes.map((_, i) => i + 1),
          y:      nodes.map(n => n.value),
          labels: nodes.map(n => n.period),
          cmd,
        };

        const yValues = nodes.map(n => n.value).join(', ');
        const periods  = nodes.map(n => n.period).join(', ');
        const prompt   =
          `来自 OpenCLI 数据采集台（指标：${cmd}），共 ${nodes.length} 条记录。\n` +
          `期间：${periods}\n` +
          `数值：${yValues}\n\n` +
          `请帮我做线性回归分析。`;

        const input = document.getElementById('user-input');
        if (input) {
          input.value = prompt;
          input.dispatchEvent(new Event('input'));
          setTimeout(() => {
            const btn = document.getElementById('send-btn');
            if (btn && !btn.disabled) btn.click();
          }, 400);
        }

        // 顶部绿色横幅
        const banner = document.createElement('div');
        banner.style.cssText =
          'position:fixed;top:0;left:0;right:0;background:#238636;' +
          'color:#fff;text-align:center;padding:9px 16px;font-size:13px;z-index:9999;';
        banner.textContent =
          `✅ 已接收来自 OpenCLI 的数据：${cmd}，共 ${nodes.length} 条，正在自动分析…`;
        document.body.prepend(banner);
        setTimeout(() => banner.remove(), 4000);
      }
    } catch(e) {
      console.error('[Pipeline] 解析失败：', e);
    }
  }
});
